<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; padding: 12px; font-family: -apple-system, sans-serif; font-size: 13px; color: #e2e8f0; background: #1e293b; margin: 0; }
    h3 { margin: 0 0 8px; font-size: 14px; color: #f1f5f9; }
    .status { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok { background: #10b981; }
    .dot.off { background: #ef4444; }
    .info { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .last { background: #0f172a; padding: 7px 8px; border-radius: 6px; margin-top: 8px; font-size: 11px; color: #94a3b8; }
    .terminals { margin-top: 8px; }
    .terminals-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
    .terminal-row { display: flex; align-items: center; gap: 6px; padding: 4px 8px; background: #0f172a; border-radius: 5px; margin-bottom: 3px; font-size: 11px; }
    .terminal-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; flex-shrink: 0; }
    .terminal-id { color: #93c5fd; font-weight: 600; }
    .terminal-meta { color: #475569; }
    .no-terminals { font-size: 11px; color: #475569; padding: 6px 8px; background: #0f172a; border-radius: 5px; }
    .poll-btn { display: block; width: 100%; margin-top: 10px; padding: 7px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .poll-btn:hover:not(:disabled) { background: #1d4ed8; }
    .poll-btn:disabled { opacity: 0.5; cursor: default; }
    .poll-result { margin-top: 8px; padding: 7px 8px; border-radius: 6px; font-size: 11px; display: none; }
    .poll-result.ok { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .poll-result.err { background: rgba(239,68,68,0.15); color: #fca5a5; }
  </style>
</head>
<body>
  <h3>Welltrax Bridge</h3>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">Checking...</span>
  </div>
  <div class="terminals">
    <div class="terminals-label">Tracked terminals</div>
    <div id="terminalList"></div>
  </div>
  <div class="last" id="lastForward" style="display:none"></div>
  <button class="poll-btn" id="pollBtn">Poll Now</button>
  <div class="poll-result" id="pollResult"></div>
  <script src="popup.js"></script>
</body>
</html>
